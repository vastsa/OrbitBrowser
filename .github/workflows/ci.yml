name: CI

on:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "v*.*.*"

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10.30.3"
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build frontend
        run: pnpm build

  rust-tests:
    name: Rust tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            file \
            dpkg \
            fakeroot \
            patchelf \
            rpm \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - frontend-build
      - rust-tests
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 5
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
      release_draft: ${{ steps.release.outputs.release_draft }}

    steps:
      - name: Create or update draft release
        id: release
        uses: actions/github-script@v7
        env:
          RELEASE_BODY: Multi-platform desktop bundles for macOS, Windows, and Linux.
        with:
          script: |
            const { owner, repo } = context.repo;
            const tagName = context.ref.replace('refs/tags/', '');
            const releaseName = `Orbit Browser ${tagName}`;
            const prerelease = tagName.includes('-');

            let generatedNotes = '';
            try {
              const notes = await github.rest.repos.generateReleaseNotes({
                owner,
                repo,
                tag_name: tagName,
                target_commitish: context.sha,
              });
              generatedNotes = notes.data.body || '';
            } catch (error) {
              core.warning(`Could not generate release notes: ${error.message}`);
            }

            const baseBody = process.env.RELEASE_BODY;
            const body = generatedNotes ? `${baseBody}\n\n${generatedNotes}` : baseBody;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });
            const existing = releases.find((release) => release.tag_name === tagName);

            const release = existing
              ? (await github.rest.repos.updateRelease({
                  owner,
                  repo,
                  release_id: existing.id,
                  tag_name: tagName,
                  target_commitish: context.sha,
                  name: releaseName,
                  body,
                  prerelease,
                })).data
              : (await github.rest.repos.createRelease({
                  owner,
                  repo,
                  tag_name: tagName,
                  target_commitish: context.sha,
                  name: releaseName,
                  body,
                  draft: true,
                  prerelease,
                })).data;

            core.setOutput('release_id', String(release.id));
            core.setOutput('release_draft', String(release.draft));

  package-release:
    name: Package ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    needs:
      - create-release
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 90
    continue-on-error: ${{ matrix.experimental }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target aarch64-apple-darwin
            experimental: false
          - label: macOS x64
            runner: macos-latest
            target: x86_64-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target x86_64-apple-darwin
            experimental: false
          - label: Windows x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            rust_targets: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc
            experimental: false
          - label: Windows arm64
            runner: windows-latest
            target: aarch64-pc-windows-msvc
            rust_targets: aarch64-pc-windows-msvc
            args: --target aarch64-pc-windows-msvc
            experimental: true
          - label: Linux x64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            rust_targets: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu
            experimental: false
          - label: Linux arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            rust_targets: aarch64-unknown-linux-gnu
            args: --target aarch64-unknown-linux-gnu
            experimental: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            file \
            dpkg \
            fakeroot \
            patchelf \
            rpm \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}
          cache-on-failure: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: ${{ github.ref_name }}
          releaseDraft: ${{ needs.create-release.outputs.release_draft }}
          args: ${{ matrix.args }}
          releaseAssetNamePattern: orbit-browser-${{ github.ref_name }}-[platform]-[arch][setup][ext]
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: orbit-browser-${{ github.ref_name }}-[platform]-[arch]-[bundle]

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - create-release
      - package-release
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const releaseId = Number('${{ needs.create-release.outputs.release_id }}');
            const release = await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: releaseId,
              draft: false,
            });

            core.notice(`Published ${release.data.html_url}`);
