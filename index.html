<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <title>Orbit Browser</title>
    <script>
      window.__ORBIT_STARTUP_AT__ = performance.now();
    </script>
    <style>
      /* 启动关键样式必须内联，确保 React 与主样式加载前不出现白屏。 */
      #startup-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        overflow: hidden;
        color: #1d1d1f;
        background:
          radial-gradient(circle at 24% 18%, rgba(51, 112, 255, 0.16), transparent 34rem),
          radial-gradient(circle at 78% 82%, rgba(110, 110, 115, 0.12), transparent 30rem),
          rgba(244, 245, 247, 0.82);
        -webkit-backdrop-filter: blur(32px) saturate(140%);
        backdrop-filter: blur(32px) saturate(140%);
        transition: opacity 280ms ease-in, visibility 280ms ease-in;
      }

      #startup-splash::before {
        content: "";
        position: absolute;
        inset: 0;
        border: 1px solid rgba(255, 255, 255, 0.68);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
        pointer-events: none;
      }

      #startup-splash.is-leaving {
        visibility: hidden;
        opacity: 0;
        pointer-events: none;
      }

      .startup-splash-content {
        position: relative;
        display: flex;
        width: min(320px, calc(100vw - 64px));
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .startup-splash-logo-shell {
        display: grid;
        width: 64px;
        height: 64px;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.76);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.58);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.9),
          0 18px 48px rgba(29, 29, 31, 0.12);
        -webkit-backdrop-filter: blur(20px);
        backdrop-filter: blur(20px);
      }

      .startup-splash-logo {
        width: 44px;
        height: 44px;
        border-radius: 13px;
        object-fit: cover;
      }

      .startup-splash-title {
        margin: 20px 0 0;
        font: 600 16px/1.4 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: -0.015em;
      }

      .startup-splash-copy {
        margin: 6px 0 0;
        color: #6e6e73;
        font: 400 12px/1.5 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .startup-splash-progress {
        width: 112px;
        height: 3px;
        margin-top: 20px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(110, 110, 115, 0.15);
      }

      .startup-splash-progress::after {
        content: "";
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: #3370ff;
        animation: orbit-startup-progress 1.1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }

      @keyframes orbit-startup-progress {
        from { transform: translateX(-125%); }
        to { transform: translateX(340%); }
      }

      @media (prefers-color-scheme: dark) {
        #startup-splash {
          color: #f0f0f2;
          background:
            radial-gradient(circle at 24% 18%, rgba(51, 112, 255, 0.2), transparent 34rem),
            radial-gradient(circle at 78% 82%, rgba(174, 174, 178, 0.08), transparent 30rem),
            rgba(20, 20, 22, 0.86);
        }

        #startup-splash::before {
          border-color: rgba(255, 255, 255, 0.1);
          box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }

        .startup-splash-logo-shell {
          border-color: rgba(255, 255, 255, 0.12);
          background: rgba(44, 44, 46, 0.64);
          box-shadow:
            inset 0 1px 0 rgba(255, 255, 255, 0.08),
            0 18px 48px rgba(0, 0, 0, 0.28);
        }

        .startup-splash-copy { color: #aeaeB2; }
        .startup-splash-progress { background: rgba(174, 174, 178, 0.16); }
      }

      @media (prefers-reduced-motion: reduce) {
        #startup-splash { transition-duration: 1ms; }
        .startup-splash-progress::after {
          width: 58%;
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="startup-splash" role="status" aria-live="polite" aria-label="Orbit Browser 正在启动">
      <div class="startup-splash-content">
        <div class="startup-splash-logo-shell">
          <picture>
            <source media="(prefers-color-scheme: dark)" srcset="/logo-dark.png" />
            <img class="startup-splash-logo" src="/logo.png" alt="" />
          </picture>
        </div>
        <p class="startup-splash-title">Orbit Browser</p>
        <p class="startup-splash-copy">正在准备自动化工作区</p>
        <div class="startup-splash-progress" aria-hidden="true"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
